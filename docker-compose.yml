services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-simpletracker}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-simpletracker}
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        environment:
            LISTEN_ADDR: 0.0.0.0:8080
            DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-simpletracker}?sslmode=disable
            CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
            JWT_SECRET: ${JWT_SECRET:-dev-local-change-me}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test:
                - CMD-SHELL
                - wget -qO- http://localhost:8080/health >/dev/null || exit 1
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                API_BASE: ${API_BASE:-http://localhost:8080}
        ports:
            - "3000:3000"
        networks:
            - app-network
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
