services:
    postgres-dev:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: simpletracker_dev
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data_dev:/var/lib/postgresql/data
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U ${POSTGRES_USER:-postgres} -d simpletracker_dev
            interval: 5s
            timeout: 5s
            retries: 5

    postgres-prod:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: simpletracker_prod
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        ports:
            - "5433:5432"
        volumes:
            - postgres_data_prod:/var/lib/postgresql/data
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U ${POSTGRES_USER:-postgres} -d simpletracker_prod
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        environment:
            LISTEN_ADDR: 0.0.0.0:8080
            APP_ENV: ${APP_ENV:-development}
            DATABASE_URL_DEVELOPMENT: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-dev:5432/simpletracker_dev?sslmode=disable
            DATABASE_URL_PRODUCTION: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-prod:5432/simpletracker_prod?sslmode=disable
            CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
            JWT_SECRET: ${JWT_SECRET:-dev-local-change-me}
        depends_on:
            postgres-dev:
                condition: service_healthy
            postgres-prod:
                condition: service_healthy
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test:
                - CMD-SHELL
                - wget -qO- http://localhost:8080/health >/dev/null || exit 1
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                API_BASE: ${API_BASE:-http://localhost:8080}
        ports:
            - "3000:3000"
        networks:
            - app-network
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data_dev:
    postgres_data_prod:
